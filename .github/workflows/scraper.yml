name: Shadowweaver Autonomous Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Scraper State
        uses: actions/cache@v4
        with:
          path: .scraper-cache
          key: shadowweaver-scraper-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4
          fi

      - name: Run Scraper
        env:
          SHADOWWEAVER_API_KEY: ${{ secrets.SHADOWWEAVER_API_KEY }}
          SHADOWWEAVER_API_URL: ${{ secrets.SHADOWWEAVER_API_URL }}
          SCRAPER_SOURCE_URLS: ${{ secrets.SCRAPER_SOURCE_URLS }}
          SCRAPER_STATE_PATH: .scraper-cache/state.json
        run: python3 scraper.py
