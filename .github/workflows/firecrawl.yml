name: Firecrawl Nightly RAG Sync

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm i --frozen-lockfile

      - name: RAG sync (crawl -> embed -> data/rag/index.json)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAG_CRAWL_ROOT_URL: https://shadowspark-tech.org/blog
          RAG_CRAWL_LIMIT: "25"
        run: pnpm rag:sync

      - id: diff
        name: Check for changes
        run: |
          if git diff --quiet -- data/rag/index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard diff size (added lines <= 800)
        if: ${{ steps.diff.outputs.changed == 'true' }}
        run: |
          added="$(git diff --numstat -- data/rag/index.json | awk '{print $1}')"
          if ! [[ "$added" =~ ^[0-9]+$ ]]; then
            added="0"
          fi
          echo "Added lines: $added"
          if [ "$added" -gt 800 ]; then
            echo "Diff too large (> 800 added lines)."
            exit 1
          fi

      - name: Create PR for updated embeddings
        if: ${{ steps.diff.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          branch: automation/firecrawl-nightly
          delete-branch: true
          commit-message: "chore(rag): nightly sync"
          title: "chore(rag): nightly sync"
          body: |
            Automated nightly RAG sync (Firecrawl crawl -> embed -> update `data/rag/index.json`).
          add-paths: |
            data/rag/index.json
